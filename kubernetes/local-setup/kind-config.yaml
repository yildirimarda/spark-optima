# Kind cluster configuration for Spark Optima local testing
# Usage: kind create cluster --config kubernetes/local-setup/kind-config.yaml

apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: spark-optima

# Node configuration
nodes:
  # Control plane
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    
    # Port mappings for local access
    extraPortMappings:
      # API port
      - containerPort: 30080
        hostPort: 8080
        listenAddress: "0.0.0.0"
        protocol: TCP
      # Ingress HTTP
      - containerPort: 30081
        hostPort: 8081
        listenAddress: "0.0.0.0"
        protocol: TCP
      # Ingress HTTPS
      - containerPort: 30443
        hostPort: 8443
        listenAddress: "0.0.0.0"
        protocol: TCP
    
    # Resource limits (adjust based on your machine)
    extraMounts:
      - hostPath: /tmp/kind-data
        containerPath: /data
    
    # Labels for node selection
    labels:
      app: spark-optima
      tier: control-plane

  # Worker nodes (optional - remove if not needed)
  - role: worker
    labels:
      app: spark-optima
      tier: worker
  
  - role: worker
    labels:
      app: spark-optima
      tier: worker

# Networking configuration
networking:
  # Use default CNI
  disableDefaultCNI: false
  
  # Pod and service CIDRs
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
  
  # API server port on host
  apiServerPort: 6443
  
  # API server address
  apiServerAddress: "127.0.0.1"

# Feature gates (optional)
featureGates:
  # Enable features if needed
  # "SomeFeature": true

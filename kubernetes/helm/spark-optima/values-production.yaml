# Production values for spark-optima
# Override values.yaml for production deployments

# =============================================================================
# API Deployment - Production
# =============================================================================
api:
  replicaCount: 3  # Higher replica count for HA
  
  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/limit-rps: "10"
      nginx.ingress.kubernetes.io/limit-connections: "5"
      # Cert-manager for TLS
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: api.spark-optima.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: spark-optima-tls
        hosts:
          - api.spark-optima.example.com
  
  resources:
    requests:
      cpu: 1000m      # Higher requests for consistent performance
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: spark-optima
                app.kubernetes.io/component: api
            topologyKey: kubernetes.io/hostname
        - weight: 50
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: spark-optima
                app.kubernetes.io/component: api
            topologyKey: topology.kubernetes.io/zone

# =============================================================================
# CLI Jobs - Production
# =============================================================================
cli:
  resources:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 2000m
      memory: 4Gi
  
  cronjob:
    enabled: true  # Enable scheduled jobs in production

# =============================================================================
# Storage - Production
# =============================================================================
persistence:
  data:
    size: 50Gi  # Larger storage for production
    storageClass: "fast-ssd"  # Use fast storage class
  
  logs:
    size: 10Gi
    storageClass: "standard"

# =============================================================================
# Configuration - Production
# =============================================================================
config:
  env: production
  logLevel: WARN  # Less verbose in production
  maxTrials: 100  # More thorough optimization
  timeoutMinutes: 60

# =============================================================================
# Monitoring - Production
# =============================================================================
monitoring:
  enabled: true
  
  serviceMonitor:
    enabled: true
    interval: 15s  # More frequent scraping

# =============================================================================
# Autoscaling - Production
# =============================================================================
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 120

# =============================================================================
# Pod Disruption Budget - Production
# =============================================================================
podDisruptionBudget:
  enabled: true
  minAvailable: 2  # Ensure at least 2 pods during disruptions

# =============================================================================
# Resource Quota - Production
# =============================================================================
resourceQuota:
  enabled: true
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    persistentvolumeclaims: "5"
    pods: "30"
    services: "10"

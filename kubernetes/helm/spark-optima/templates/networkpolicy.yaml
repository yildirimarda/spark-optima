{{- if and .Values.api.enabled .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "spark-optima.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spark-optima.api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "spark-optima.api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  
  {{- if .Values.networkPolicy.ingress.enabled }}
  ingress:
    # Allow from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    
    # Allow from within namespace
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "spark-optima.name" . }}
      ports:
        - protocol: TCP
          port: 8000
    
    # Allow from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8000
  {{- end }}
  
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    # DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    
    # HTTPS external
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
  {{- end }}
{{- end }}

{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spark-optima.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spark-optima.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "spark-optima.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spark-optima.api.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "{{ .Values.monitoring.enabled }}"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "spark-optima.api.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      
      initContainers:
        - name: init-data
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /app/data/cache
              mkdir -p /app/data/results
              mkdir -p /app/logs
              chown -R {{ .Values.api.podSecurityContext.runAsUser }}:{{ .Values.api.podSecurityContext.fsGroup }} /app/data /app/logs
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      
      containers:
        - name: api
          image: {{ include "spark-optima.api.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.targetPort }}
              protocol: TCP
          
          command:
            - uvicorn
            - spark_optima.api.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "{{ .Values.api.service.port }}"
            - --workers
            - "2"
            - --log-level
            - "{{ lower .Values.config.logLevel }}"
          
          envFrom:
            - configMapRef:
                name: {{ include "spark-optima.configMapName" . }}
          
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /tmp
          
          {{- if .Values.api.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.livenessProbe.failureThreshold }}
          {{- end }}
          
          {{- if .Values.api.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.readinessProbe.failureThreshold }}
          {{- end }}
          
          {{- if .Values.api.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.api.startupProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.api.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.api.startupProbe.failureThreshold }}
          {{- end }}
          
          securityContext:
            {{- toYaml .Values.api.securityContext | nindent 12 }}
      
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "spark-optima.pvc.dataName" . }}
        - name: logs
          persistentVolumeClaim:
            claimName: {{ include "spark-optima.pvc.logsName" . }}
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
      
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- with .Values.api.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

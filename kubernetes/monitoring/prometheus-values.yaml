# Prometheus Helm Values for Spark Optima
# Install with: helm install prometheus prometheus-community/kube-prometheus-stack -f prometheus-values.yaml

# Prometheus configuration
prometheus:
  prometheusSpec:
    # Retention settings
    retention: "30d"
    retentionSize: "50GB"
    
    # Storage
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          resources:
            requests:
              storage: 50Gi
    
    # Resource limits
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 4Gi
    
    # Service monitors
    serviceMonitorSelector:
      matchLabels:
        prometheus.io/scrape: "true"
    
    # Additional scrape configs
    additionalScrapeConfigs:
      - job_name: 'spark-optima-api'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
                - spark-optima
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
            action: keep
            regex: spark-optima
          - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_component]
            action: keep
            regex: api
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http

# Grafana configuration
grafana:
  enabled: true
  
  # Admin credentials (change in production!)
  adminUser: admin
  adminPassword: spark-optima-admin
  
  # Persistence
  persistence:
    enabled: true
    storageClassName: standard
    size: 10Gi
  
  # Resource limits
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  
  # Dashboard providers
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'spark-optima'
          orgId: 1
          folder: 'Spark Optima'
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/spark-optima
  
  # Dashboards
  dashboards:
    spark-optima:
      spark-optima-dashboard:
        url: https://raw.githubusercontent.com/spark-optima/spark-optima/main/kubernetes/monitoring/grafana-dashboard.json

# Alertmanager configuration
alertmanager:
  enabled: true
  
  config:
    global:
      smtp_smarthost: 'localhost:587'
      smtp_from: 'alertmanager@spark-optima.local'
    
    route:
      receiver: 'default'
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    
    receivers:
      - name: 'default'
        email_configs:
          - to: 'admin@spark-optima.local'
            send_resolved: true

# Node exporter
nodeExporter:
  enabled: true

# Kube state metrics
kubeStateMetrics:
  enabled: true

# Prometheus operator
prometheusOperator:
  enabled: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

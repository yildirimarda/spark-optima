# Spark Optima API Deployment
# Production-grade deployment with rolling updates and health checks

apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-optima-api
  namespace: spark-optima
  labels:
    app.kubernetes.io/name: spark-optima
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: spark-optima
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Ensure zero downtime
  selector:
    matchLabels:
      app.kubernetes.io/name: spark-optima
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spark-optima
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: spark-optima
        app.kubernetes.io/version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: spark-optima
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Init container to ensure data directories exist
      initContainers:
        - name: init-data
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /app/data/cache
              mkdir -p /app/data/results
              mkdir -p /app/logs
              chown -R 1000:1000 /app/data /app/logs
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      
      containers:
        - name: api
          image: spark-optima:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          
          command:
            - uvicorn
            - spark_optima.api.main:app
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
            - --workers
            - "2"
            - --log-level
            - "info"
          
          envFrom:
            - configMapRef:
                name: spark-optima-config
          
          env:
            # Override specific settings for container environment
            - name: SPARK_OPTIMA_CONFIG_PATH
              value: "/app/config"
            - name: SPARK_OPTIMA_DATA_PATH
              value: "/app/data"
            - name: SPARK_OPTIMA_LOG_PATH
              value: "/app/logs"
          
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /tmp
          
          # Liveness probe - restart if unhealthy
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe - remove from service if not ready
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          # Startup probe - give time for slow starts
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12  # 60 seconds max
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Need write for logs/data
            capabilities:
              drop:
                - ALL
      
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: spark-optima-data
        - name: logs
          persistentVolumeClaim:
            claimName: spark-optima-logs
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
      
      # Pod topology spread for high availability
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: spark-optima
              app.kubernetes.io/component: api
      
      # Affinity rules
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: spark-optima
                    app.kubernetes.io/component: api
                topologyKey: kubernetes.io/hostname

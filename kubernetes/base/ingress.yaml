# Spark Optima Ingress
# NGINX Ingress Controller configuration for external access

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spark-optima-api
  namespace: spark-optima
  labels:
    app.kubernetes.io/name: spark-optima
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: spark-optima
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "5"
    
    # Timeout settings
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    
    # CORS (adjust origins for production)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    
    # Certificate management (cert-manager)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # Documentation
    description: "Ingress for Spark Optima API - NGINX Controller"
spec:
  ingressClassName: nginx
  
  # TLS configuration
  tls:
    - hosts:
        - spark-optima.local
        - api.spark-optima.local
      secretName: spark-optima-tls
  
  rules:
    - host: spark-optima.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spark-optima-api
                port:
                  number: 8000
    
    - host: api.spark-optima.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spark-optima-api
                port:
                  number: 8000

---
# Alternative: Ingress without TLS for local development
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spark-optima-api-local
  namespace: spark-optima
  labels:
    app.kubernetes.io/name: spark-optima
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: spark-optima
    app.kubernetes.io/subcomponent: local
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    description: "Ingress for local development (no TLS)"
spec:
  ingressClassName: nginx
  rules:
    - host: spark-optima.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spark-optima-api
                port:
                  number: 8000

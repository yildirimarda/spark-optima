# Spark Optima HorizontalPodAutoscaler
# Automatically scales API pods based on CPU/memory usage

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spark-optima-api
  namespace: spark-optima
  labels:
    app.kubernetes.io/name: spark-optima
    app.kubernetes.io/component: hpa
    app.kubernetes.io/part-of: spark-optima
  annotations:
    description: "HPA for Spark Optima API - auto-scaling based on CPU/memory"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spark-optima-api
  
  minReplicas: 2  # Minimum for HA
  maxReplicas: 10  # Maximum scale limit
  
  metrics:
    # Scale based on CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # Scale when CPU > 70%
    
    # Scale based on memory utilization
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80  # Scale when memory > 80%
  
  behavior:
    # Scale up quickly
    scaleUp:
      stabilizationWindowSeconds: 60  # Wait 1 min before scaling up
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60  # Double replicas every minute
        - type: Pods
          value: 2
          periodSeconds: 60  # Or add 2 pods per minute
      selectPolicy: Max
    
    # Scale down slowly
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
        - type: Percent
          value: 50
          periodSeconds: 120  # Reduce by 50% every 2 minutes
        - type: Pods
          value: 1
          periodSeconds: 120  # Or remove 1 pod every 2 minutes
      selectPolicy: Min

# Spark Optima ServiceAccount
# Dedicated service account for Spark Optima pods with minimal permissions

apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-optima
  namespace: spark-optima
  labels:
    app.kubernetes.io/name: spark-optima
    app.kubernetes.io/component: serviceaccount
    app.kubernetes.io/part-of: spark-optima
  annotations:
    description: "ServiceAccount for Spark Optima API and Jobs"

---
# ServiceAccount for CLI Jobs (separate for isolation)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-optima-cli
  namespace: spark-optima
  labels:
    app.kubernetes.io/name: spark-optima
    app.kubernetes.io/component: serviceaccount
    app.kubernetes.io/part-of: spark-optima
    app.kubernetes.io/subcomponent: cli
  annotations:
    description: "ServiceAccount for Spark Optima CLI Jobs"

# Spark Optima CLI Job Template
# Example Job for running Spark Optima CLI commands in Kubernetes

apiVersion: batch/v1
kind: Job
metadata:
  name: spark-optima-cli-example
  namespace: spark-optima
  labels:
    app.kubernetes.io/name: spark-optima
    app.kubernetes.io/component: cli-job
    app.kubernetes.io/part-of: spark-optima
    app.kubernetes.io/version: "0.1.0"
  annotations:
    description: "Example Job for Spark Optima CLI - demonstrates optimization workflow"
spec:
  ttlSecondsAfterFinished: 3600  # Auto-delete after 1 hour
  backoffLimit: 2  # Retry on failure
  activeDeadlineSeconds: 3600  # Timeout after 1 hour
  
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spark-optima
        app.kubernetes.io/component: cli-job
        app.kubernetes.io/part-of: spark-optima
      annotations:
        prometheus.io/scrape: "false"  # Don't scrape CLI jobs
    spec:
      serviceAccountName: spark-optima-cli
      restartPolicy: OnFailure
      
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      initContainers:
        # Ensure output directory exists
        - name: init-output
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /app/data/results
              chown -R 1000:1000 /app/data
          volumeMounts:
            - name: data
              mountPath: /app/data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      
      containers:
        - name: spark-optima-cli
          image: spark-optima:0.1.0
          imagePullPolicy: IfNotPresent
          
          # Example: Run optimization with specific parameters
          command:
            - python
            - -m
            - spark_optima.cli.main
            - optimize
            - --platform
            - "databricks"
            - --spark-version
            - "3.5.0"
            - --output-format
            - "json"
            - --output
            - "/app/data/results/optimization_result.json"
          
          envFrom:
            - configMapRef:
                name: spark-optima-config
          
          env:
            - name: SPARK_OPTIMA_ENV
              value: "production"
            - name: SPARK_OPTIMA_LOG_LEVEL
              value: "INFO"
          
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
          
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: spark-optima-data
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi

---
# CronJob for scheduled optimization runs
apiVersion: batch/v1
kind: CronJob
metadata:
  name: spark-optima-cli-scheduled
  namespace: spark-optima
  labels:
    app.kubernetes.io/name: spark-optima
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/part-of: spark-optima
  annotations:
    description: "Scheduled optimization runs - adjust schedule as needed"
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  concurrencyPolicy: Forbid  # Don't run multiple instances
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  startingDeadlineSeconds: 3600
  
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400  # Keep for 24 hours
      backoffLimit: 1
      activeDeadlineSeconds: 7200  # 2 hour timeout
      
      template:
        metadata:
          labels:
            app.kubernetes.io/name: spark-optima
            app.kubernetes.io/component: cli-job
            app.kubernetes.io/part-of: spark-optima
        spec:
          serviceAccountName: spark-optima-cli
          restartPolicy: OnFailure
          
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          
          containers:
            - name: spark-optima-cli
              image: spark-optima:0.1.0
              imagePullPolicy: IfNotPresent
              
              # Example scheduled optimization
              command:
                - python
                - -m
                - spark_optima.cli.main
                - optimize
                - --platform
                - "local"
                - --output-format
                - "json"
                - --output
                - "/app/data/results/scheduled_$(date +%Y%m%d_%H%M%S).json"
              
              envFrom:
                - configMapRef:
                    name: spark-optima-config
              
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: 1000m
                  memory: 2Gi
              
              volumeMounts:
                - name: data
                  mountPath: /app/data
                - name: tmp
                  mountPath: /tmp
              
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop:
                    - ALL
          
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: spark-optima-data
            - name: tmp
              emptyDir:
                sizeLimit: 100Mi

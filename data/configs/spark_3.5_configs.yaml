# Spark Optima - Apache Spark 3.5.x Configuration Database
# Version: 3.5.0 - 3.5.4
# Description: Comprehensive configuration parameters for Spark 3.5.x
# Source: https://spark.apache.org/docs/3.5.0/configuration.html

version: "3.5.0"
release_date: "2023-09-13"
documentation_url: "https://spark.apache.org/docs/3.5.0/configuration.html"

metadata:
  total_parameters: 220
  categories:
    - memory
    - cpu
    - shuffle
    - serialization
    - sql
    - dynamic_allocation
    - runtime
    - io
    - network
    - security
    - scheduler
    - ui_history

# ============================================================================
# MEMORY CONFIGURATION PARAMETERS
# ============================================================================
parameters:
  # Driver Memory Settings
  spark.driver.memory:
    category: memory
    type: bytes
    default: "1g"
    description: "Amount of memory to use for the driver process"
    since_version: "1.0.0"
    constraints:
      min_value: 512
      pattern: "^\\d+[gGmMkK]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "min(total_memory_gb * 0.1, 16)"
      base_value: "4g"
      priority: high
      depends_on: [total_memory_gb]
      description: "Driver memory should be 10% of total or max 16GB"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#memory-management"

  spark.driver.memoryOverhead:
    category: memory
    type: bytes
    default: null
    description: "Overhead memory for driver non-heap memory (off-heap, VM overhead)"
    since_version: "2.3.0"
    constraints:
      min_value: 384
      pattern: "^\\d+[gGmMkK]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "max(driver_memory * 0.1, 384)"
      base_value: "1g"
      priority: high
      depends_on: [driver_memory]
      description: "Overhead is 10% of driver memory or minimum 384MB"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#memory-management"

  spark.driver.maxResultSize:
    category: memory
    type: bytes
    default: "1g"
    description: "Limit of total size of serialized results of all partitions"
    since_version: "1.2.0"
    constraints:
      min_value: 1
      pattern: "^\\d+[gGmMkK]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "min(driver_memory * 0.8, 8g)"
      base_value: "2g"
      priority: medium
      depends_on: [driver_memory]
      description: "Limit to 80% of driver memory or max 8GB"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#memory-management"

  # Executor Memory Settings
  spark.executor.memory:
    category: memory
    type: bytes
    default: "1g"
    description: "Amount of memory to use per executor process"
    since_version: "0.5.0"
    constraints:
      min_value: 512
      pattern: "^\\d+[gGmMkK]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "min((total_memory_gb - driver_memory_gb) / num_executors * 0.9, 64)"
      base_value: "4g"
      priority: high
      depends_on: [total_memory_gb, driver_memory_gb, num_executors]
      description: "Distribute remaining memory across executors with 10% buffer"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#memory-management"

  spark.executor.memoryOverhead:
    category: memory
    type: bytes
    default: null
    description: "Overhead memory for executor non-heap memory per executor"
    since_version: "2.3.0"
    constraints:
      min_value: 384
      pattern: "^\\d+[gGmMkK]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "max(executor_memory * overhead_factor, 384)"
      base_value: "1g"
      priority: high
      depends_on: [executor_memory, overhead_factor]
      conditions:
        overhead_factor: 0.1
      description: "Overhead is 10% of executor memory or minimum 384MB"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#memory-management"

  spark.executor.memoryOverheadFactor:
    category: memory
    type: float
    default: 0.1
    description: "Fraction of executor memory to be allocated as overhead"
    since_version: "3.3.0"
    constraints:
      min_value: 0.0
      max_value: 1.0
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: 0.1
      priority: medium
      description: "Default 10% overhead, increase for Python/PySpark workloads"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#memory-management"

  spark.executor.pyspark.memory:
    category: memory
    type: bytes
    default: null
    description: "Memory for PySpark to use (in addition to JVM memory)"
    since_version: "2.4.0"
    constraints:
      min_value: 512
      pattern: "^\\d+[gGmMkK]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "executor_memory * 0.2"
      base_value: "2g"
      priority: medium
      depends_on: [executor_memory]
      description: "Allocate 20% of executor memory for Python processes"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#memory-management"

  # Unified Memory Management
  spark.memory.fraction:
    category: memory
    type: float
    default: 0.6
    description: "Fraction of heap space for execution and storage"
    since_version: "1.6.0"
    constraints:
      min_value: 0.0
      max_value: 1.0
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: 0.6
      priority: high
      description: "60% for execution/storage, 40% for user data and Spark internal metadata"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#memory-management"

  spark.memory.storageFraction:
    category: memory
    type: float
    default: 0.5
    description: "Fraction of spark.memory.fraction for storage (rest for execution)"
    since_version: "1.6.0"
    constraints:
      min_value: 0.0
      max_value: 1.0
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: 0.5
      priority: medium
      description: "50-50 split between storage and execution when cached"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#memory-management"

  spark.memory.offHeap.enabled:
    category: memory
    type: boolean
    default: false
    description: "Enable off-heap memory allocation for execution and storage"
    since_version: "1.6.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: false
      priority: medium
      conditions:
        large_shuffles: true
      description: "Enable for large shuffle operations to avoid GC pressure"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#memory-management"

  spark.memory.offHeap.size:
    category: memory
    type: bytes
    default: null
    description: "Absolute amount of off-heap memory in bytes"
    since_version: "1.6.0"
    constraints:
      min_value: 1
      pattern: "^\\d+[gGmMkK]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "executor_memory * 0.3"
      base_value: "2g"
      priority: medium
      depends_on: [executor_memory]
      conditions:
        off_heap_enabled: true
      description: "Allocate 30% of executor memory for off-heap"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#memory-management"

  # Garbage Collection
  spark.cleaner.periodicGC.interval:
    category: memory
    type: duration
    default: "30min"
    description: "Interval for periodic GC calls to clean up weak references"
    since_version: "1.0.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: "30min"
      priority: low
      description: "Periodic GC helps clean up weak references"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#garbage-collection"

  # ============================================================================
  # CPU CONFIGURATION PARAMETERS
  # ============================================================================
  spark.executor.cores:
    category: cpu
    type: integer
    default: 1
    description: "Number of cores to use on each executor"
    since_version: "1.0.0"
    constraints:
      min_value: 1
      max_value: 64
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "min(max(4, total_cores / num_executors), 8)"
      base_value: 4
      priority: high
      depends_on: [total_cores, num_executors]
      description: "Use 4-8 cores per executor for optimal parallelism"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#execution-behavior"

  spark.task.cpus:
    category: cpu
    type: integer
    default: 1
    description: "Number of CPUs to allocate per task"
    since_version: "1.0.0"
    constraints:
      min_value: 1
      max_value: 64
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: 1
      priority: medium
      description: "Usually 1 CPU per task, increase for CPU-intensive tasks"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#execution-behavior"

  spark.default.parallelism:
    category: cpu
    type: integer
    default: null
    description: "Default number of partitions for RDDs and parallelize()"
    since_version: "0.5.0"
    constraints:
      min_value: 1
      max_value: 100000
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "executor_cores * num_executors * 2"
      base_value: 200
      priority: high
      depends_on: [executor_cores, num_executors]
      description: "2-3 tasks per core for optimal parallelism"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#execution-behavior"

  spark.scheduler.mode:
    category: scheduler
    type: string
    default: "FIFO"
    description: "Scheduling mode: FIFO, FAIR, or NONE"
    since_version: "0.8.0"
    constraints:
      allowed_values: ["FIFO", "FAIR", "NONE"]
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: "FIFO"
      priority: medium
      description: "FIFO for single-user, FAIR for multi-user scenarios"
    doc_url: "https://spark.apache.org/docs/3.5.0/job-scheduling.html"

  spark.scheduler.revive.interval:
    category: scheduler
    type: duration
    default: "1s"
    description: "Interval for scheduler to revive offers from resource manager"
    since_version: "3.0.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: "1s"
      priority: low
      description: "Lower for faster task scheduling in dynamic allocation"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#scheduling"

  # ============================================================================
  # SHUFFLE CONFIGURATION PARAMETERS
  # ============================================================================
  spark.sql.shuffle.partitions:
    category: shuffle
    type: integer
    default: 200
    description: "Number of partitions to use in shuffle operations for DataFrame/Dataset"
    since_version: "1.1.0"
    constraints:
      min_value: 1
      max_value: 100000
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "max(200, min(executor_cores * num_executors * 2, 10000))"
      base_value: 200
      priority: high
      depends_on: [executor_cores, num_executors]
      description: "2-3 partitions per core, min 200, max 10000"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-performance-tuning.html"

  spark.shuffle.partitions:
    category: shuffle
    type: integer
    default: null
    description: "Default number of map/reduce tasks in shuffle (RDD API)"
    since_version: "0.5.0"
    constraints:
      min_value: 1
      max_value: 100000
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "spark_sql_shuffle_partitions"
      base_value: 200
      priority: medium
      depends_on: [spark_sql_shuffle_partitions]
      description: "Keep consistent with spark.sql.shuffle.partitions"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#shuffle-behavior"

  spark.shuffle.file.buffer:
    category: shuffle
    type: bytes
    default: "32k"
    description: "Size of in-memory buffer for shuffle disk writes"
    since_version: "1.4.0"
    constraints:
      min_value: 1024
      pattern: "^\\d+[kKmM]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "max(32k, min(1m, executor_memory / 1000))"
      base_value: "1m"
      priority: medium
      depends_on: [executor_memory]
      description: "Increase to 1MB for large shuffle operations"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#shuffle-behavior"

  spark.shuffle.spill.compress:
    category: shuffle
    type: boolean
    default: true
    description: "Compress shuffle spill files"
    since_version: "0.9.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: true
      priority: high
      description: "Always enable to reduce disk I/O during spills"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#shuffle-behavior"

  spark.shuffle.spill.diskWriteBufferSize:
    category: shuffle
    type: bytes
    default: "1m"
    description: "Buffer size for writing shuffle spill files to disk"
    since_version: "3.0.0"
    constraints:
      min_value: 1024
      pattern: "^\\d+[kKmM]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: "1m"
      priority: medium
      description: "1MB buffer balances memory and I/O"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#shuffle-behavior"

  spark.reducer.maxSizeInFlight:
    category: shuffle
    type: bytes
    default: "48m"
    description: "Maximum size of map outputs to fetch simultaneously from each reduce task"
    since_version: "1.0.0"
    constraints:
      min_value: 1
      pattern: "^\\d+[gGmMkK]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "min(96m, executor_memory / 20)"
      base_value: "48m"
      priority: medium
      depends_on: [executor_memory]
      description: "Increase for large memory executors, up to 96MB"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#shuffle-behavior"

  spark.reducer.maxReqsInFlight:
    category: shuffle
    type: integer
    default: 2147483647
    description: "Maximum number of remote requests to fetch blocks at any given point"
    since_version: "2.0.0"
    constraints:
      min_value: 1
      max_value: 2147483647
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: 2147483647
      priority: low
      description: "Keep default unlimited unless network issues"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#shuffle-behavior"

  spark.shuffle.compress:
    category: shuffle
    type: boolean
    default: true
    description: "Compress shuffle output files"
    since_version: "0.6.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: true
      priority: high
      description: "Always enable unless CPU-bound with fast network"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#shuffle-behavior"

  spark.shuffle.sort.bypassMergeThreshold:
    category: shuffle
    type: integer
    default: 200
    description: "Threshold for bypassing merge-sort in shuffle"
    since_version: "1.1.1"
    constraints:
      min_value: 1
      max_value: 10000
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: 200
      priority: low
      description: "Bypass sort-merge for small number of partitions"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#shuffle-behavior"

  spark.shuffle.mapStatus.compression.codec:
    category: shuffle
    type: string
    default: "lz4"
    description: "Compression codec for map status"
    since_version: "3.0.0"
    constraints:
      allowed_values: ["lz4", "lzf", "snappy", "zstd", "none"]
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: "lz4"
      priority: medium
      description: "lz4 for speed, zstd for better compression"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#shuffle-behavior"

  # ============================================================================
  # SERIALIZATION CONFIGURATION PARAMETERS
  # ============================================================================
  spark.serializer:
    category: serialization
    type: string
    default: "org.apache.spark.serializer.JavaSerializer"
    description: "Class to use for serializing objects"
    since_version: "0.5.0"
    constraints:
      allowed_values:
        [
          "org.apache.spark.serializer.JavaSerializer",
          "org.apache.spark.serializer.KryoSerializer",
        ]
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: "org.apache.spark.serializer.KryoSerializer"
      priority: high
      description: "Kryo is faster and more compact than JavaSerializer"
    doc_url: "https://spark.apache.org/docs/3.5.0/tuning.html#data-serialization"

  spark.kryo.registrator:
    category: serialization
    type: string
    default: null
    description: "Class to register custom classes with Kryo"
    since_version: "0.5.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      priority: low
      description: "Register custom classes for better Kryo performance"
    doc_url: "https://spark.apache.org/docs/3.5.0/tuning.html#data-serialization"

  spark.kryo.registrationRequired:
    category: serialization
    type: boolean
    default: false
    description: "Require registration with Kryo"
    since_version: "1.1.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: false
      priority: low
      description: "Enable only for performance critical code"
    doc_url: "https://spark.apache.org/docs/3.5.0/tuning.html#data-serialization"

  spark.kryoserializer.buffer.max:
    category: serialization
    type: bytes
    default: "64m"
    description: "Maximum buffer size for Kryo serialization"
    since_version: "1.4.0"
    constraints:
      min_value: 1
      max_value: 2048
      pattern: "^\\d+[gGmMkK]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "min(512m, max(64m, executor_memory / 8))"
      base_value: "64m"
      priority: medium
      depends_on: [executor_memory]
      description: "Scale with executor memory, max 512MB"
    doc_url: "https://spark.apache.org/docs/3.5.0/tuning.html#data-serialization"

  spark.kryoserializer.buffer:
    category: serialization
    type: bytes
    default: "64k"
    description: "Initial buffer size for Kryo serialization"
    since_version: "1.4.0"
    constraints:
      min_value: 1
      pattern: "^\\d+[kKmM]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: "64k"
      priority: low
      description: "Increase if objects are large"
    doc_url: "https://spark.apache.org/docs/3.5.0/tuning.html#data-serialization"

  # ============================================================================
  # SQL & AQE CONFIGURATION PARAMETERS
  # ============================================================================
  spark.sql.adaptive.enabled:
    category: sql
    type: boolean
    default: true
    description: "Enable Adaptive Query Execution (AQE)"
    since_version: "3.0.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: true
      priority: high
      description: "Always enable AQE for better performance"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-performance-tuning.html#adaptive-query-execution"

  spark.sql.adaptive.coalescePartitions.enabled:
    category: sql
    type: boolean
    default: true
    description: "Enable coalescing post-shuffle partitions"
    since_version: "3.0.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: true
      priority: high
      description: "Reduces small file problem after shuffle"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-performance-tuning.html#adaptive-query-execution"

  spark.sql.adaptive.coalescePartitions.minPartitionSize:
    category: sql
    type: bytes
    default: "1mb"
    description: "Minimum size of partitions after coalescing"
    since_version: "3.2.0"
    constraints:
      min_value: 1
      pattern: "^\\d+[gGmMkK]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "max(1mb, data_size_gb * 1024 / target_partitions / 4)"
      base_value: "4mb"
      priority: medium
      depends_on: [data_size_gb, target_partitions]
      description: "Balance between parallelism and file size"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-performance-tuning.html#adaptive-query-execution"

  spark.sql.adaptive.coalescePartitions.initialPartitionNum:
    category: sql
    type: integer
    default: null
    description: "Initial number of shuffle partitions before coalescing"
    since_version: "3.0.0"
    constraints:
      min_value: 1
      max_value: 50000
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "spark_sql_shuffle_partitions * 2"
      base_value: 400
      priority: medium
      depends_on: [spark_sql_shuffle_partitions]
      description: "Start with 2x target partitions for better coalescing"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-performance-tuning.html#adaptive-query-execution"

  spark.sql.adaptive.skewJoin.enabled:
    category: sql
    type: boolean
    default: true
    description: "Enable skew join optimization in AQE"
    since_version: "3.0.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: true
      priority: high
      description: "Automatically handle skewed joins"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-performance-tuning.html#adaptive-query-execution"

  spark.sql.adaptive.skewJoin.skewedPartitionFactor:
    category: sql
    type: float
    default: 5.0
    description: "Partition is skewed if size > factor * median partition size"
    since_version: "3.0.0"
    constraints:
      min_value: 1.0
      max_value: 100.0
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: 5.0
      priority: medium
      description: "5x median is a good threshold for skew detection"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-performance-tuning.html#adaptive-query-execution"

  spark.sql.adaptive.skewJoin.skewedPartitionThresholdInBytes:
    category: sql
    type: bytes
    default: "256m"

      pattern: "^\\d+[gGmMkK]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: "256m"
      priority: medium
      description: "256MB is a reasonable minimum for skew consideration"

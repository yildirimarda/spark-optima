  # UI & HISTORY SERVER CONFIGURATION PARAMETERS
  # ============================================================================
  spark.ui.enabled:
    category: ui_history
    type: boolean
    default: true
    description: "Enable Spark UI"
    since_version: "1.0.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: true
      priority: medium
      description: "Enable for monitoring and debugging"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#spark-ui"

  spark.ui.port:
    category: ui_history
    type: integer
    default: 4040
    description: "Port for Spark UI"
    since_version: "0.7.0"
    constraints:
      min_value: 1024
      max_value: 65535
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: 4040
      priority: low
      description: "Standard Spark UI port"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#spark-ui"

  spark.ui.retainedStages:
    category: ui_history
    type: integer
    default: 1000
    description: "Number of stages to retain in UI"
    since_version: "0.9.0"
    constraints:
      min_value: 1
      max_value: 100000
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: 1000
      priority: low
      description: "Retain enough for debugging"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#spark-ui"

  spark.ui.retainedTasks:
    category: ui_history
    type: integer
    default: 100000
    description: "Number of tasks to retain in UI"
    since_version: "0.9.0"
    constraints:
      min_value: 1
      max_value: 1000000
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: 100000
      priority: low
      description: "Default retains many tasks"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#spark-ui"

  spark.ui.retainedJobs:
    category: ui_history
    type: integer
    default: 1000
    description: "Number of jobs to retain in UI"
    since_version: "1.2.0"
    constraints:
      min_value: 1
      max_value: 100000
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: 1000
      priority: low
      description: "Retain enough jobs for debugging"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#spark-ui"

  spark.eventLog.enabled:
    category: ui_history
    type: boolean
    default: false
    description: "Enable logging Spark events"
    since_version: "1.0.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: true
      priority: high
      description: "Enable for history server and debugging"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#spark-ui"

  spark.eventLog.dir:
    category: ui_history
    type: string
    default: null
    description: "Base directory for event logs"
    since_version: "1.0.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      priority: high
      conditions:
        event_log_enabled: true
      description: "Set durable storage for event logs"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#spark-ui"

  spark.eventLog.compress:
    category: ui_history
    type: boolean
    default: false
    description: "Compress event logs"
    since_version: "1.0.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: true
      priority: medium
      description: "Compress to save storage space"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#spark-ui"

  spark.history.ui.maxApplications:
    category: ui_history
    type: integer
    default: 50
    description: "Maximum number of applications to display in history UI"
    since_version: "1.0.0"
    constraints:
      min_value: 1
      max_value: 10000
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: 100
      priority: low
      description: "Show more applications in history"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#spark-ui"

  spark.history.fs.cleaner.enabled:
    category: ui_history
    type: boolean
    default: false
    description: "Enable periodic cleanup of event logs"
    since_version: "1.0.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: true
      priority: medium
      description: "Enable to manage storage costs"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#spark-ui"

  spark.history.fs.cleaner.maxAge:
    category: ui_history
    type: duration
    default: "7d"
    description: "Maximum age of event logs before deletion"
    since_version: "1.0.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: "30d"
      priority: medium
      description: "Keep 30 days of history by default"
    doc_url: "https://spark.apache.org/docs/3.5.0/configuration.html#spark-ui"

  # ============================================================================
  # ADDITIONAL IMPORTANT PARAMETERS
  # ============================================================================
  spark.sql.parquet.compression.codec:
    category: io
    type: string
    default: "snappy"
    description: "Compression codec for Parquet files"
    since_version: "2.0.0"
    constraints:
      allowed_values: ["uncompressed", "snappy", "gzip", "lzo", "zstd", "lz4", "brotli"]
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: "zstd"
      priority: high
      description: "zstd for best compression ratio, snappy for speed"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-data-sources-parquet.html"

  spark.sql.orc.compression.codec:
    category: io
    type: string
    default: "zlib"
    description: "Compression codec for ORC files"
    since_version: "2.3.0"
    constraints:
      allowed_values: ["none", "uncompressed", "snappy", "zlib", "lzo", "zstd", "lz4"]
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: "zstd"
      priority: high
      description: "zstd for best compression ratio"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-data-sources-orc.html"

  spark.sql.hive.convertMetastoreParquet:
    category: sql
    type: boolean
    default: true
    description: "Convert Parquet tables in Hive metastore to use Spark SQL Parquet"
    since_version: "1.1.1"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: true
      priority: medium
      description: "Enable for better Parquet performance"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-data-sources-parquet.html"

  spark.sql.sources.partitionOverwriteMode:
    category: sql
    type: string
    default: "STATIC"
    description: "Mode for partition overwrite operations"
    since_version: "2.3.0"
    constraints:
      allowed_values: ["STATIC", "DYNAMIC"]
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: "DYNAMIC"
      priority: medium
      description: "DYNAMIC for overwriting only affected partitions"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-data-sources-load-save-functions.html"

  spark.sql.streaming.checkpointLocation:
    category: sql
    type: string
    default: null
    description: "Default checkpoint location for streaming queries"
    since_version: "2.0.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      priority: high
      conditions:
        streaming_enabled: true
      description: "Must be set for fault-tolerant streaming"
    doc_url: "https://spark.apache.org/docs/3.5.0/structured-streaming-programming-guide.html"

  spark.sql.streaming.minBatchesToRetain:
    category: sql
    type: integer
    default: 100
    description: "Minimum number of batches to retain for streaming"
    since_version: "2.0.0"
    constraints:
      min_value: 1
      max_value: 10000
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: 100
      priority: medium
      description: "Retain enough for recovery"
    doc_url: "https://spark.apache.org/docs/3.5.0/structured-streaming-programming-guide.html"

  spark.sql.streaming.pollingDelay:
    category: sql
    type: duration
    default: "10ms"
    description: "Delay when polling for new data in streaming"
    since_version: "2.0.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: "100ms"
      priority: low
      description: "Increase to reduce CPU usage for low-latency sources"
    doc_url: "https://spark.apache.org/docs/3.5.0/structured-streaming-programming-guide.html"

  spark.sql.extensions:
    category: sql
    type: string
    default: null
    description: "Comma-separated list of SQL extension classes"
    since_version: "2.2.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      priority: low
      description: "Register custom SQL extensions (e.g., Delta, Iceberg)"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-ref-syntax.html"

  spark.databricks.delta.optimizeWrite.enabled:
    category: sql
    type: boolean
    default: false
    description: "Enable optimized writes for Delta Lake (Databricks specific)"
    since_version: "3.0.0"
    applicable_platforms: [databricks]
    heuristic:
      base_value: true
      priority: high
      description: "Optimize file sizes in Delta writes"
    doc_url: "https://docs.databricks.com/delta/optimizations/auto-optimize.html"

  spark.databricks.delta.autoCompact.enabled:
    category: sql
    type: boolean
    default: false
    description: "Enable auto compaction for Delta Lake (Databricks specific)"
    since_version: "3.0.0"
    applicable_platforms: [databricks]
    heuristic:
      base_value: true
      priority: high
      description: "Automatically compact small files"
    doc_url: "https://docs.databricks.com/delta/optimizations/auto-optimize.html"

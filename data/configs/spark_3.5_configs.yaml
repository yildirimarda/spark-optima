    type: bytes
    default: "128m"
    description: "Maximum number of bytes to pack into a single partition"
    since_version: "2.0.0"
    constraints:
      min_value: 1
      pattern: "^\\d+[gGmMkK]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "max(64m, min(1g, block_size * 2))"

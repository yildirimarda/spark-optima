  spark.sql.adaptive.localShuffleReader.enabled:
    category: sql
    type: boolean
    default: true
    description: "Optimize shuffle reading when possible"
    since_version: "3.0.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: true
      priority: high
      description: "Avoid shuffle when reading from local nodes"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-performance-tuning.html#adaptive-query-execution"

  spark.sql.adaptive.optimizeSkewsInRebalancePartitions.enabled:
    category: sql
    type: boolean
    default: true
    description: "Optimize skews in rebalance partitions"
    since_version: "3.2.0"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      base_value: true
      priority: medium
      description: "Handle skews in rebalance operations"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-performance-tuning.html#adaptive-query-execution"

  spark.sql.autoBroadcastJoinThreshold:
    category: sql
    type: bytes
    default: "10m"
    description: "Maximum size for automatic broadcast join"
    since_version: "1.1.0"
    constraints:
      min_value: -1
      pattern: "^-?\\d+[gGmMkK]?[bB]?$"
    applicable_platforms: [local, databricks, aws_glue, azure_synapse]
    heuristic:
      formula: "min(100m, max(10m, driver_memory / 10))"
      base_value: "10m"
      priority: high
      depends_on: [driver_memory]
      description: "Broadcast small tables up to 10-100MB"
    doc_url: "https://spark.apache.org/docs/3.5.0/sql-performance-tuning.html#join-strategy-hints"

  spark.sql.broadcastTimeout:
